<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form controls</title>
<style>
  :root { --bg:#0b0d16; --fg:#e6e8ef; --muted:#8b91a4; --line:#2a2f42; --accent:#5aa6ff; --field:#161a28; }
  body { background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; margin: 0; padding: 32px; max-width: 720px; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 24px; }
  .field { margin: 16px 0; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type=text], input[type=search], input[type=email], input[type=password], textarea, select {
    width: 100%; font-size: 16px; padding: 9px 12px; color: var(--fg);
    background: var(--field); border: 1px solid var(--line); border-radius: 8px; font-family: inherit;
  }
  textarea { min-height: 70px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 15px; }
  button { font-size: 15px; padding: 9px 18px; border-radius: 8px; border: 0; cursor: pointer;
    background: var(--accent); color: #04121f; font-weight: 600; }
  .out { margin-top: 8px; font-size: 13px; color: var(--accent); font-family: ui-monospace, monospace; min-height: 18px; }
</style>
</head>
<body>
  <h1>Form controls</h1>
  <p class="sub">Click a text field to see the caret. Click the dropdown to pick an option. Toggle the checkboxes/radios.</p>

  <div class="field">
    <label for="t1">Text input (click for caret, then type)</label>
    <input id="t1" type="text" value="edit me">
  </div>

  <div class="field">
    <label for="t2">Empty input (placeholder + caret)</label>
    <input id="t2" type="text" placeholder="type something…">
  </div>

  <div class="field">
    <label for="ta">Textarea</label>
    <textarea id="ta">Multi-line text area.</textarea>
  </div>

  <div class="field">
    <label for="sel">Select (click to open the dropdown)</label>
    <select id="sel" onchange="document.getElementById('selout').textContent='changed → ' + this.value">
      <option value="apple">Apple</option>
      <option value="banana" selected>Banana</option>
      <option value="cherry">Cherry</option>
      <option value="date">Date</option>
    </select>
    <div class="out" id="selout">selected → Banana</div>
  </div>

  <div class="field">
    <label>Checkboxes</label>
    <div class="row">
      <span class="check"><input type="checkbox" checked> Supported</span>
      <span class="check"><input type="checkbox" checked> Partial</span>
      <span class="check"><input type="checkbox"> Unsupported</span>
    </div>
  </div>

  <div class="field">
    <label>Radios</label>
    <div class="row">
      <span class="check"><input type="radio" name="r" checked> One</span>
      <span class="check"><input type="radio" name="r"> Two</span>
      <span class="check"><input type="radio" name="r"> Three</span>
    </div>
  </div>

  <div class="field">
    <button onclick="document.getElementById('btnout').textContent='clicked at ' + Date.now()">Click me</button>
    <div class="out" id="btnout"></div>
  </div>
</body>
</html>
